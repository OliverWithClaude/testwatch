<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestWatch - {% block title %}{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-brand">TestWatch</div>
        <div class="nav-links">
            <a href="/stopwatch" class="{% if request.path == '/stopwatch' %}active{% endif %}">Stopwatch</a>
            <a href="/statistics" class="{% if request.path == '/statistics' %}active{% endif %}">Statistics</a>
            <a href="/preparation" class="{% if request.path == '/preparation' %}active{% endif %}">Preparation</a>
            <a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">Admin</a>
        </div>
        <div class="nav-clock" id="nav-clock"></div>
    </nav>

    <!-- Persistent session bar — visible on all pages when a session is active -->
    <div id="session-bar" class="session-bar" style="display:none;">
        <div class="session-bar-left">
            <span class="session-bar-label" id="bar-session-label"></span>
            <span id="bar-activity-badge" class="badge">—</span>
        </div>
        <div class="session-bar-center">
            <div class="bar-timer-display" id="bar-timer">00:00:00</div>
        </div>
        <div class="session-bar-right">
            <a href="/stopwatch" class="btn btn-sm btn-primary">Open Stopwatch</a>
        </div>
    </div>

    <!-- Server alert banner -->
    <div id="server-alert-bar" class="server-alert-bar" style="display:none;"></div>

    <main class="content">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/session-bar.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
